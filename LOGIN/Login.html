<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Movilidad Urbana</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="container" id="loginContainer">
            <div class="heading-group">
                <div class="logo-container">
                    <i data-lucide="bus" class="logo-icon"></i>
                </div>
                <h1>Movilidad Urbana</h1>
                
            </div>

            <form class="form" id="loginForm">
    <div class="input-group">
        <label for="email"><i data-lucide="mail"></i> Correo electrónico</label>
        <input required class="input" type="email" id="email" placeholder="ejemplo@correo.com">
    </div>

    <div class="input-group">
        <label for="password"><i data-lucide="lock"></i> Contraseña</label>
        <div class="password-container">
            <input required class="input" type="password" id="password" placeholder="••••••••">
            <span class="eye-icon toggle-pass"><i data-lucide="eye"></i></span>
        </div>
    </div>

                <div class="meta-form-row">
                    <span class="forgot-password"><a href="#" id="goToRegister">¿No tienes cuenta? Regístrate aquí</a></span>
                </div>

                <button type="submit" class="login-button">
                    <i data-lucide="log-out"></i> Iniciar Sesión
                </button>
            </form>
        </div>

        <div class="container hide" id="registerContainer">
            <div class="heading-group">
                <div class="logo-container">
                    <i data-lucide="user-plus" class="logo-icon"></i>
                </div>
                <h1>Crear Cuenta</h1>
                <p class="subtitle">Registra tus datos en el sistema</p>
            </div>

            <form class="form" id="registerForm">
                <div class="input-group">
                    <label for="regName"><i data-lucide="user"></i> Nombre Completo</label>
                    <input required class="input" type="text" id="regName" placeholder="Jesús Alfonso">
                </div>

                <div class="input-group">
                    <label for="regEmail"><i data-lucide="mail"></i> Correo electrónico</label>
                    <input required class="input" type="email" id="regEmail" placeholder="ejemplo@correo.com">
                </div>

                <div class="input-group">
                    <label for="regPassword"><i data-lucide="lock"></i> Contraseña</label>
                    <div class="password-container">
                        <input required class="input" type="password" id="regPassword" placeholder="••••••••">
                        <span class="eye-icon toggle-pass"><i data-lucide="eye"></i></span>
                    </div>
                </div>

                <div class="meta-form-row">
                    <span class="forgot-password"><a href="#" id="goToLogin">¿Ya tienes cuenta? Inicia sesión</a></span>
                </div>

                <button type="submit" class="login-button" style="background-color: var(--accent-green);">
                    <i data-lucide="check"></i> Registrarme
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="Login.js"></script>
</body>
</html>
