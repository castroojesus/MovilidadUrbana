<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios - Movilidad Urbana</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="horario.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo-container">
                    <i data-lucide="bus" class="logo-icon"></i>
                </div>

                <nav class="nav-menu">
                    <a href="../Inicio/inicio.html" class="nav-item" title="Inicio">
                        <i data-lucide="home"></i>
                    </a>
                    
                    <a href="../Mapa/Mapa.html" class="nav-item" title="Mapa">
                        <i data-lucide="map"></i>
                    </a>
                    
                    <a href="../Rutas/rutas.html" class="nav-item" title="Rutas">
                        <i data-lucide="git-merge"></i>
                    </a>
                    
                    <a href="#" class="nav-item active" title="Horarios">
                        <i data-lucide="clock"></i>
                    </a>
                    
                    <a href="../Planificador/planificador.html" class="nav-item" title="Planificador">
                        <i data-lucide="navigation"></i>
                    </a>
                    
                    <a href="../Favoritos/favoritos.html" class="nav-item" title="Favoritos">
                        <i data-lucide="star"></i>
                    </a>
                    
                    <a href="../Reportes/reportes.html" class="nav-item" title="Reportar">
                        <i data-lucide="alert-circle"></i>
                    </a>
                </nav>
            </div>
            
            <div class="sidebar-bottom">
                <button class="logout-btn" id="logoutBtn" title="Cerrar Sesión">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <h1>Horarios y Despachos</h1>
                    <div class="header-welcome-group">
                        <span class="welcome-top-text">Consulta las salidas de,</span>
                        <h2 class="welcome-user-heading">Jesús Alfonso</h2>
                    </div>
                </div>
               
                <div class="topbar-right">
                    <div class="theme-toggle" id="themeToggleBtn">
                        <span class="toggle-mode dark-label active"><i data-lucide="moon"></i></span>
                        <span class="toggle-mode light-label"><i data-lucide="sun"></i></span>
                    </div>
                    
                    <div class="notification-wrapper" id="notificationMenuWrapper">
                        <button class="icon-circle-btn" id="bellBtn">
                            <i data-lucide="bell"></i>
                            <span class="bell-badge">4</span>
                        </button>
                        <div class="dropdown-menu notification-dropdown" id="notificationDropdown">
                            <div class="dropdown-header">Notificaciones Recientes</div>
                            <div class="dropdown-item success">La Línea L1 se encuentra operando sin demoras.</div>
                            <div class="dropdown-item warning">Alerta: Línea L2 presenta un retraso menor.</div>
                            <div class="dropdown-item danger">Actualización de mapas completada con éxito.</div>
                        </div>
                    </div>

                    <div class="profile-wrapper" id="profileMenuWrapper">
                        <div class="profile-trigger" id="profileBtn">
                            <div class="profile-info-text">
                                <span class="profile-name">Jesús Alfonso</span>
                                <span class="profile-role">Pasajero</span>
                            </div>
                            <div class="avatar">JA</div>
                        </div>
                    </div>
                </div>
            </header>

            <section class="pill-filters-wrapper">
                <div class="pill-filters" id="pillsContainer">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    </div>
            </section>

            <div class="schedule-grid-list" id="scheduleContainer">
                </div>
        </main>
    </div>

    <script src="horario.js"></script>
</body>
</html>
