<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movilidad Urbana Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <i class="fa-solid fa-bus"></i>
                <div>
                    <h2>Movilidad Urbana</h2>
                    <p>Sistema de Transporte</p>
                </div>
            </div>
            <div class="user-card">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div class="user-info">
                    <h3>Andrew Minyard</h3>
                    <p>Chofer</p>
                </div>
            </div>
            <nav class="menu">
                <p class="menu-title">MENÚ</p>
                <a href="#" id="btn-inicio" class="menu-item active"><i class="fa-solid fa-house"></i> Inicio</a>
                <a href="#" class="menu-item"><i class="fa-solid fa-map"></i> Mapa</a>
                <a href="#" class="menu-item"><i class="fa-solid fa-route"></i> Mi Ruta</a>
                <a href="#" id="btn-horario" class="menu-item"><i class="fa-regular fa-clock"></i> Horario</a>
                <a href="#" class="menu-item"><i class="fa-solid fa-power-off"></i> Mi Turno</a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <h2 id="header-title">Inicio</h2>
                <div class="header-actions">
                    <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                    <button class="role-btn"><i class="fa-solid fa-bus"></i> Chofer</button>
                </div>
            </header>
            <main id="content-area" class="content-area"></main>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
